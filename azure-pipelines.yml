trigger: none

parameters:
  - name: imageName
    displayName: "Container Image Name"
    type: string
    default: "nginx:latest"

variables:
  CONSOLE_URL: "https://65.108.157.51:30106"  # replace with your Console URL
  TWISTCLI_BIN: "twistcli"
  SCAN_OUTPUT_JSON: "$(Build.ArtifactStagingDirectory)/twistcli-scan-result.json"

stages:
  - stage: PrismaScan
    displayName: "Prisma Cloud Image Scan"
    jobs:
      - job: RunScan
        displayName: "Generate Token & Scan Image"
        pool:
          name: 'Default'
        steps:
          - checkout: self

          # Step 1: Authenticate and get token dynamically
          - script: |
              echo "Authenticating with Prisma Cloud..."
              RESPONSE=$(curl -H "Content-Type: application/json" -k -d '{ "username":"admin2", "password":"12345678"}' \
                -X POST "${CONSOLE_URL}/api/v34.01/authenticate")
              
              echo "Parsing token..."
              API_TOKEN=$(echo $RESPONSE | jq -r '.token')

              if [ "$API_TOKEN" = "null" ] || [ -z "$API_TOKEN" ]; then
                echo "❌ Failed to retrieve Prisma Cloud API token"
                echo "Response: $RESPONSE"
                exit 1
              fi

              echo "✅ Token retrieved successfully"
              echo "##vso[task.setvariable variable=PRISMA_API_TOKEN;issecret=true]$API_TOKEN"
            env:
              PRISMA_USERNAME: $(PRISMA_USERNAME)
              PRISMA_PASSWORD: $(PRISMA_PASSWORD)
            displayName: "Generate Prisma Cloud API Token"

          # Step 2: Download twistcli
          - script: |
              echo ${PRISMA_API_TOKEN}
              echo "Downloading twistcli from ${CONSOLE_URL}..."
              curl -L -o twistcli "${CONSOLE_URL}/api/v34.01/util/twistcli" -k -H "Authorization: Bearer ${PRISMA_API_TOKEN}"
              chmod +x twistcli
            env:
              PRISMA_API_TOKEN: $(PRISMA_API_TOKEN)

            displayName: "Download twistcli"

          # Step 3: Run the scan
          - script: |
              echo "Running Prisma Cloud scan for image: ${{ parameters.imageName }}"
              ls -lah twistcli
              ./twistcli images scan \
                --address "${CONSOLE_URL}" \
                --token "$(PRISMA_API_TOKEN)" \
                --details docker.io/library/nginx:latest \
               # "${{ parameters.imageName }}"

              SCAN_EXIT_CODE=$?
              echo "Scan exit code: ${SCAN_EXIT_CODE}"

              if [ $SCAN_EXIT_CODE -ne 0 ]; then
                echo "❌ TwistCLI scan failed"
                exit $SCAN_EXIT_CODE
              fi
            env:
              PRISMA_API_TOKEN: $(PRISMA_API_TOKEN)
            displayName: "Run TwistCLI Scan"

